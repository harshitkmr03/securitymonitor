spring.application.name=securitymonitor

spring.datasource.url=jdbc:postgresql://localhost:5432/security_monitoring_db
spring.datasource.username=postgres
spring.datasource.password=postgres123

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.harshit.securitymonitor

server.port=8080

# Disable default Spring Security user
spring.security.user.name=admin
spring.security.user.password=admin

# ADD THIS (VERY IMPORTANT)
management.endpoints.web.exposure.include=*